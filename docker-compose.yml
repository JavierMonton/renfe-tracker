# Renfe Tracker – single service (FastAPI + static frontend, SQLite in volume).
# Run: docker compose up --build
# App: http://localhost:8000 (host port configurable via .env PORT)
#
# Data persistence: SQLite and any app data live in ./data on the host (mounted at
# /data in the container). The app uses DATA_DIR=/data so the DB file is
# /data/renfe_tracker.db. If you see permission errors, run: chown -R 1000:1000 ./data

services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    restart: unless-stopped
